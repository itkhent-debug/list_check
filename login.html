<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        if (window.location.protocol === 'http:' && !window.location.hostname.includes('localhost') && !window.location.hostname.includes('127.0.0.1')) {
            window.location.href = window.location.href.replace('http:', 'https:');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CRM Checklist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1e293b;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 8px;
            padding: 48px 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-container {
            margin-bottom: 24px;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.5px;
        }

        .logo-subtitle {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
            font-weight: 500;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #64748b;
            line-height: 1.5;
        }

        .divider {
            height: 1px;
            background: #e2e8f0;
            margin: 24px 0;
        }

        .error-msg {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 12px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            line-height: 1.4;
        }

        .success-msg {
            background: #dcfce7;
            border: 1px solid #86efac;
            color: #166534;
            padding: 12px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-group input::placeholder {
            color: #94a3b8;
        }

        .btn-login {
            width: 100%;
            padding: 12px 16px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-login:hover:not(:disabled) {
            background: #2563eb;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-login:active:not(:disabled) {
            transform: translateY(1px);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .google-divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            gap: 12px;
        }

        .google-divider span {
            font-size: 12px;
            color: #94a3b8;
            font-weight: 500;
        }

        .google-divider::before,
        .google-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .google-signin-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .google-btn {
            padding: 10px 16px;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            color: #0f172a;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            justify-content: center;
        }

        .google-btn:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }

        .google-btn:active {
            transform: translateY(1px);
        }

        .google-btn .google-icon {
            height: 18px;
            width: 18px;
        }

        .domain-notice {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 6px;
            padding: 12px 14px;
            font-size: 12px;
            color: #0c4a6e;
            text-align: center;
            margin-top: 20px;
            line-height: 1.4;
        }

        .domain-notice strong {
            font-weight: 600;
        }

        .footer-text {
            text-align: center;
            color: #94a3b8;
            font-size: 12px;
            margin-top: 24px;
            line-height: 1.5;
        }

        .footer-text a {
            color: #3b82f6;
            text-decoration: none;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-container">
                    <div class="logo-text">CRM Checklist</div>
                    <div class="logo-subtitle">Team Management Platform</div>
                </div>
                <h1 class="login-title">Welcome</h1>
                <p class="login-subtitle">Sign in with your 247GA Google account to continue</p>
            </div>

            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>

            <form id="loginForm" style="display: none;">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="your.email@247ga.co" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span>Sign In</span>
                </button>
            </form>

            <div class="google-signin-container">
                <div id="g_id_onload"
                    data-client_id="YOUR_GOOGLE_CLIENT_ID"
                    data-callback="handleGoogleLogin">
                </div>
                <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="signin_with" data-shape="rectangular" data-logo_alignment="left"></div>
            </div>

            <div class="domain-notice">
                <strong>Google Sign-In Required:</strong><br>
                Only @247ga.co Google accounts are permitted. Your account will be automatically verified.
            </div>

            <div class="footer-text">
                &copy; 2026 CRM Checklist. All rights reserved.
            </div>
        </div>
    </div>

    <script>
        // Check if already logged in
        (async function checkSession() {
            const token = localStorage.getItem('crm_token');
            if (!token) return;
            try {
                const res = await fetch('api/auth.php?action=me', {
                    headers: { 'X-Auth-Token': token }
                });
                if (res.ok) {
                    const data = await res.json();
                    if (data.authenticated) {
                        window.location.href = 'index.html';
                    }
                }
            } catch (e) {}
        })();

        // Handle Google Sign-In callback
        async function handleGoogleLogin(response) {
            const token = response.credential;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            try {
                const res = await fetch('api/auth.php?action=google-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });

                const raw = await res.text();
                let data = {};
                try { data = raw ? JSON.parse(raw) : {}; } catch (_) { data = {}; }

                if (res.ok && data.token) {
                    localStorage.setItem('crm_token', data.token);
                    successMsg.textContent = 'Login successful! Redirecting...';
                    successMsg.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 800);
                } else {
                    errorMsg.textContent = data.error || `Login failed (${res.status}). Please use a @247ga.co Google account.`;
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Network error: ' + (err?.message || 'request failed') + '. Try again.';
                errorMsg.style.display = 'block';
            }
        }

        // Expose to window for Google callback
        window.handleGoogleLogin = handleGoogleLogin;
    </script>
</body>
</html>
