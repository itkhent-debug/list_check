<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CRM Checklist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', sans-serif;
            background: #e7e5e4;
            min-height: 100vh;
            color: #e5e5e5;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .bg-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8vw;
            font-weight: 900;
            text-transform: uppercase;
            white-space: nowrap;
            color: #131313;
            background: transparent;
            letter-spacing: .15em;
            text-shadow: 1px -1px 0 #767676, -1px 2px 1px #737272, -2px 4px 1px #767474, -3px 6px 1px #787777, -4px 8px 1px #7b7a7a, -5px 10px 1px #7f7d7d, -6px 12px 1px #828181, -7px 14px 1px #868585, -8px 16px 1px #8b8a89, -9px 18px 1px #8f8e8d, -10px 20px 1px #949392, -11px 22px 1px #999897, -12px 24px 1px #9e9c9c, -13px 26px 1px #a3a1a1, -14px 28px 1px #a8a6a6, -15px 30px 1px #adabab, -16px 32px 1px #b2b1b0, -17px 34px 1px #b7b6b5, -18px 36px 1px #bcbbba, -19px 38px 1px #c1bfbf, -20px 40px 1px #c6c4c4, -21px 42px 1px #cbc9c8, -22px 44px 1px #cfcdcd, -23px 46px 1px #d4d2d1, -24px 48px 1px #d8d6d5, -25px 50px 1px #dbdad9, -26px 52px 1px #dfdddc, -27px 54px 1px #e2e0df, -28px 56px 1px #e4e3e2;
            z-index: 0;
            pointer-events: none;
            user-select: none;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: transparent;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 32px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.3),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        /* Animated Title Button */
        .btn-title,
        .btn-title *,
        .btn-title :after,
        .btn-title :before,
        .btn-title:after,
        .btn-title:before {
            border: 0 solid;
            box-sizing: border-box;
        }

        .btn-title {
            -webkit-tap-highlight-color: transparent;
            background-color: #000;
            color: #fff;
            cursor: default;
            padding: 1.2rem 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            display: inline-block;
            border-radius: 0;
            position: relative;
            overflow: hidden;
            font-family: 'Roboto', sans-serif;
            font-size: 20px;
            line-height: 1.5;
            margin: 0;
            border: 1px solid #333;
        }

        .btn-title .original {
            background: #fff;
            color: #000;
            position: absolute;
            inset: 0;
            display: grid;
            place-content: center;
            transition: transform 0.2s cubic-bezier(0.87, 0, 0.13, 1);
            font-weight: 700;
        }

        .btn-title:hover .original {
            transform: translateY(100%);
        }

        .btn-title .letters {
            display: flex;
            justify-content: center;
            height: 100%;
        }

        .btn-title span {
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s cubic-bezier(0.87, 0, 0.13, 1);
            transition-delay: 0.1s;
        }

        .btn-title:hover span {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-title:hover span:nth-child(1) { transition-delay: 0.02s; }
        .btn-title:hover span:nth-child(2) { transition-delay: 0.04s; }
        .btn-title:hover span:nth-child(3) { transition-delay: 0.06s; }
        .btn-title:hover span:nth-child(4) { transition-delay: 0.08s; }
        .btn-title:hover span:nth-child(5) { transition-delay: 0.10s; }
        .btn-title:hover span:nth-child(6) { transition-delay: 0.12s; }
        .btn-title:hover span:nth-child(7) { transition-delay: 0.14s; }
        .btn-title:hover span:nth-child(8) { transition-delay: 0.16s; }
        .btn-title:hover span:nth-child(9) { transition-delay: 0.18s; }
        .btn-title:hover span:nth-child(10) { transition-delay: 0.20s; }
        .btn-title:hover span:nth-child(11) { transition-delay: 0.22s; }
        .btn-title:hover span:nth-child(12) { transition-delay: 0.24s; }
        .btn-title:hover span:nth-child(13) { transition-delay: 0.26s; }

        .btn-title span.space {
            width: 0.4em;
        }

        .login-header p {
            color: #000000;
            font-size: 0.9rem;
            margin-top: 8px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #a3a3a3;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            border-radius: 0.8rem;
            background: #1a1a1a;
            padding: 1rem;
            border: 1px solid transparent;
            color: white;
            font-size: 1rem;
            transition: all 0.2s ease-in-out;
            outline: none;
        }

        .form-group input:focus {
            border: 1px solid #3b82f6;
            box-shadow:
                inset 0px 0px 10px rgba(59, 130, 246, 0.5),
                inset 0px 0px 10px rgba(96, 165, 250, 0.5),
                0px 0px 50px rgba(59, 130, 246, 0.3),
                0px 0px 100px rgba(96, 165, 250, 0.2);
        }

        .form-group input::placeholder {
            color: #525252;
        }

        .domain-hint {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }

        .domain-hint span {
            color: #000000;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .domain-badge {
            background: rgba(0, 0, 0, 0.1);
            color: #000000;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .btn-login {
            position: relative;
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(to bottom right, #2e8eff 0%, rgba(46, 142, 255, 0) 30%);
            background-color: rgba(46, 142, 255, 0.2);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 8px;
            isolation: isolate;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            inset: 2px;
            border-radius: 13px;
            background-color: #1a1a1a;
            z-index: -1;
            transition: 0.3s ease;
        }

        .btn-login:hover,
        .btn-login:focus {
            background-color: rgba(46, 142, 255, 0.7);
            box-shadow: 0 0 10px rgba(46, 142, 255, 0.5);
            outline: none;
        }

        .btn-login:hover::before {
            background-color: #222;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .error-msg {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
        }

        .footer-text {
            text-align: center;
            color: #000000;
            font-size: 0.75rem;
            margin-top: 24px;
            font-weight: 500;
        }

        .google-signin-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        /* Fancy Google Button */
        .google-btn {
            padding: 12px 24px;
            font-weight: bold;
            display: flex;
            position: relative;
            overflow: hidden;
            border-radius: 35px;
            align-items: center;
            border: solid #333 2px;
            outline: none;
            background: #171717;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .google-btn:hover {
            border-color: #4285F4;
        }

        .google-btn .google-icon {
            height: 24px;
            width: 24px;
            margin-right: 12px;
            z-index: 6;
        }

        .google-btn .text {
            z-index: 10;
            font-size: 15px;
            color: #ffffff;
            font-weight: 600;
            transition: color 0.3s;
        }

        .google-btn:hover .text {
            animation: gtext forwards 0.3s;
        }

        @keyframes gtext {
            from { color: #e5e5e5; }
            to { color: white; }
        }

        .google-btn:hover::before {
            content: "";
            display: block;
            position: absolute;
            top: 50%;
            left: 9%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            opacity: 0;
            border-radius: 300px;
            animation: gwave1 2.5s ease-in-out forwards;
        }

        .google-btn:hover::after {
            content: "";
            display: block;
            position: absolute;
            top: 50%;
            left: 9%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            opacity: 0;
            border-radius: 300px;
            animation: gwave2 2.5s ease-in-out forwards;
        }

        @keyframes gwave1 {
            0%, 1% { z-index: 1; background: #EB4335; width: 0; height: 0; opacity: 1; }
            25% { z-index: 1; background: #EB4335; width: 800px; height: 800px; opacity: 1; }
            26% { z-index: 3; background: #34A853; width: 0; height: 0; opacity: 1; }
            50%, 70%, 100% { z-index: 3; background: #34A853; width: 800px; height: 800px; opacity: 1; }
        }

        @keyframes gwave2 {
            0%, 11% { z-index: 2; background: #FBBC05; width: 0; height: 0; opacity: 1; }
            35%, 39% { z-index: 2; background: #FBBC05; width: 800px; height: 800px; opacity: 1; }
            40% { z-index: 4; background: #4285F4; width: 0; height: 0; opacity: 1; }
            64%, 100% { z-index: 4; background: #4285F4; width: 800px; height: 800px; opacity: 1; }
        }

        .google-btn:hover .red { animation: gdisappear 0.1s forwards; animation-delay: 0.1s; }
        .google-btn:hover .yellow { animation: gdisappear 0.1s forwards; animation-delay: 0.3s; }
        .google-btn:hover .green { animation: gdisappear 0.1s forwards; animation-delay: 0.7s; }
        .google-btn:hover .blue { animation: gdisappear 0.1s forwards; animation-delay: 1.1s; }

        @keyframes gdisappear {
            from { filter: brightness(1); }
            to { filter: brightness(100); }
        }

        .domain-notice {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }

        .domain-notice span {
            color: #000000;
            font-size: 0.8rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="bg-text">CRM CHECKLIST</div>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="brand">
                    <div class="btn-title">
                        <span class="original">CRM CHECKLIST</span>
                        <div class="letters">
                            <span>C</span><span>R</span><span>M</span>
                            <span class="space"></span>
                            <span>C</span><span>H</span><span>E</span><span>C</span><span>K</span><span>L</span><span>I</span><span>S</span><span>T</span>
                        </div>
                    </div>
                </div>
                <p>Welcome back! Please login to continue.</p>
            </div>

            <div class="error-msg" id="errorMsg">Invalid email or password.</div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email / Username</label>
                    <input type="text" id="email" placeholder="firspointCHL" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span>Login</span>
                </button>
            </form>

            <div class="footer-text">
                &copy; 2026 CRM Checklist. All rights reserved.
            </div>
        </div>
    </div>

    <script>
        // Check if already logged in
        (async function checkSession() {
            const token = localStorage.getItem('crm_token');
            if (!token) return;
            try {
                const res = await fetch('api/auth.php?action=me', {
                    headers: { 'X-Auth-Token': token }
                });
                if (res.ok) {
                    const data = await res.json();
                    if (data.authenticated) {
                        window.location.href = 'index.html';
                    }
                }
            } catch (e) {}
        })();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            btn.disabled = true;
            btn.innerHTML = '<span>Logging in...</span>';
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('api/auth.php?action=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    if (data.token) localStorage.setItem('crm_token', data.token);
                    window.location.href = 'index.html';
                } else {
                    errorMsg.textContent = data.error || 'Login failed';
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = '<span>Login</span>';
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Try again.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<span>Login</span>';
            }
        });
    </script>
</body>
</html>
